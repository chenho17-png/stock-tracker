<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>股票持倉追蹤儀表板</title>
<style>
  :root {
    --bg: #f5f5f0;
    --surface: #ffffff;
    --surface2: #f0eeea;
    --border: rgba(0,0,0,0.12);
    --text: #1a1a18;
    --text2: #6b6b68;
    --text3: #9b9b98;
    --green: #3B6D11;
    --green-bg: #EAF3DE;
    --red: #A32D2D;
    --red-bg: #FCEBEB;
    --amber: #854F0B;
    --amber-bg: #FAEEDA;
    --blue: #185FA5;
    --blue-bg: #E6F1FB;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2e2e2c;
      --border: rgba(255,255,255,0.1);
      --text: #f0eeea;
      --text2: #a0a09d;
      --text3: #6b6b68;
      --green-bg: #1a2e0a;
      --red-bg: #2e0f0f;
      --amber-bg: #2e1e08;
      --blue-bg: #0a1e35;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  /* Header */
  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  .topbar h1 { font-size: 20px; font-weight: 600; }
  .topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  .dot.paused { background: var(--amber); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .countdown { font-size: 11px; color: var(--text3); min-width: 80px; }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; cursor: pointer; transition: background 0.15s; white-space: nowrap; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* Metrics */
  .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
  .metric { background: var(--surface); border-radius: var(--radius); padding: 14px 16px; border: 1px solid var(--border); }
  .metric .label { font-size: 11px; color: var(--text2); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .metric .val { font-size: 22px; font-weight: 600; }
  .metric .sub { font-size: 11px; color: var(--text2); margin-top: 3px; }
  .c-green { color: var(--green); }
  .c-red { color: var(--red); }
  .c-amber { color: var(--amber); }

  /* Section */
  .section { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border); overflow: hidden; margin-bottom: 16px; }
  .section-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); flex-wrap: wrap; gap: 8px; }
  .section-title { font-size: 13px; font-weight: 500; }
  .section-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-weight: 400; font-size: 11px; color: var(--text2); padding: 8px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; background: var(--surface2); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .loading-row td { text-align: center; padding: 32px; color: var(--text2); font-size: 13px; }

  /* Badges */
  .badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 500; }
  .b-gain { background: var(--green-bg); color: var(--green); }
  .b-loss { background: var(--red-bg); color: var(--red); }
  .b-warn { background: var(--amber-bg); color: var(--amber); }
  .b-buy { background: var(--green-bg); color: var(--green); }
  .b-hold { background: var(--amber-bg); color: var(--amber); }
  .b-sell { background: var(--red-bg); color: var(--red); }
  .b-etf { background: var(--blue-bg); color: var(--blue); }
  .b-bond { background: #EEEDFE; color: #3C3489; }
  .b-ma-warn { background: var(--amber-bg); color: var(--amber); font-size: 10px; padding: 2px 6px; border-radius: 4px; }

  /* Mini bar */
  .bar-wrap { width: 52px; height: 4px; background: var(--border); border-radius: 2px; display: inline-block; vertical-align: middle; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; }

  /* Spinner */
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.7s linear infinite; display: inline-block; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Update log */
  .log { padding: 10px 16px; font-size: 11px; color: var(--text2); border-top: 1px solid var(--border); max-height: 80px; overflow-y: auto; line-height: 1.8; }
  .log span { margin-right: 12px; }
  .log .ok { color: var(--green); }
  .log .err { color: var(--red); }

  /* Add stock form */
  .add-form { padding: 16px; border-top: 1px solid var(--border); display: none; }
  .add-form.open { display: block; }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
  .form-group label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .form-group input, .form-group select { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); color: var(--text); font-size: 13px; }

  /* Footer */
  .footer { text-align: center; font-size: 11px; color: var(--text3); margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); }

  /* Market status banner */
  .market-banner { padding: 8px 16px; font-size: 12px; border-radius: var(--radius); margin-bottom: 16px; display: none; }
  .market-banner.closed { display: block; background: var(--amber-bg); color: var(--amber); }
  .market-banner.open { display: block; background: var(--green-bg); color: var(--green); }

  /* Error notice */
  .error-notice { padding: 12px 16px; background: var(--red-bg); color: var(--red); border-radius: var(--radius); font-size: 12px; margin-bottom: 12px; display: none; }

  @media (max-width: 600px) {
    .metric .val { font-size: 18px; }
    table { font-size: 12px; }
    td, th { padding: 8px; }
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="topbar">
    <div>
      <h1>📊 股票持倉追蹤</h1>
      <div style="font-size:12px;color:var(--text2);margin-top:3px" id="last-update-text">初始化中...</div>
    </div>
    <div class="topbar-right">
      <div class="status">
        <div class="dot" id="status-dot"></div>
        <span id="status-text">連接中...</span>
      </div>
      <div class="countdown" id="countdown-text"></div>
      <button class="btn btn-sm" onclick="togglePause()" id="pause-btn">⏸ 暫停更新</button>
      <button class="btn btn-sm btn-primary" onclick="fetchAll()">↻ 立即更新</button>
    </div>
  </div>

  <!-- Market status banner -->
  <div class="market-banner" id="market-banner"></div>
  <div class="error-notice" id="error-notice"></div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric">
      <div class="label">持倉成本</div>
      <div class="val" id="m-cost">—</div>
      <div class="sub" id="m-cnt">共 0 檔</div>
    </div>
    <div class="metric">
      <div class="label">持倉市值</div>
      <div class="val" id="m-value">—</div>
      <div class="sub" id="m-value-sub">—</div>
    </div>
    <div class="metric">
      <div class="label">總損益</div>
      <div class="val" id="m-pnl">—</div>
      <div class="sub" id="m-pnl-pct">—</div>
    </div>
    <div class="metric">
      <div class="label">MA20 警示</div>
      <div class="val c-amber" id="m-warn">—</div>
      <div class="sub">跌破月線</div>
    </div>
    <div class="metric">
      <div class="label">今日最強</div>
      <div class="val c-green" id="m-best">—</div>
      <div class="sub" id="m-best-name">—</div>
    </div>
    <div class="metric">
      <div class="label">今日最弱</div>
      <div class="val c-red" id="m-worst">—</div>
      <div class="sub" id="m-worst-name">—</div>
    </div>
  </div>

  <!-- Holdings Table -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">持倉清單</span>
      <div class="section-actions">
        <input type="text" placeholder="搜尋..." id="search-input" oninput="renderTable()" style="padding:5px 10px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px;width:140px">
        <select id="type-filter" onchange="renderTable()" style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px">
          <option value="">全部類型</option>
          <option value="stock">個股</option>
          <option value="etf">ETF</option>
          <option value="bond">債券ETF</option>
        </select>
        <select id="sort-select" onchange="renderTable()" style="padding:5px 8px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:12px">
          <option value="cost-desc">依成本排序</option>
          <option value="ret-desc">依報酬（高→低）</option>
          <option value="ret-asc">依報酬（低→高）</option>
          <option value="code">依代號</option>
        </select>
        <button class="btn btn-sm" onclick="toggleAddForm()">＋ 新增</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>代號</th><th>名稱</th><th>類型</th>
            <th>買入均價</th><th>持有股數</th><th>買入成本</th>
            <th>現價</th><th>今日漲跌</th><th>報酬率</th>
            <th>MA20</th><th>操作</th>
          </tr>
        </thead>
        <tbody id="holdings-body">
          <tr class="loading-row"><td colspan="11"><span class="spinner"></span> 載入中...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="add-form" id="add-form">
      <div class="form-grid">
        <div class="form-group"><label>股票代號 *</label><input id="f-code" placeholder="例：2330"></div>
        <div class="form-group"><label>名稱</label><input id="f-name" placeholder="例：台積電"></div>
        <div class="form-group"><label>類型</label><select id="f-type"><option value="stock">個股</option><option value="etf">ETF</option><option value="bond">債券ETF</option></select></div>
        <div class="form-group" *</label><input id="f-shares" type="number" placeholder="1000"></div>
        <div class="form-group"><label>買入均價 *</label><input id="f-cost" type="number" step="0.01" placeholder="750"></div>
        <div class="form-group"><label>MA20（選填）</label><input id="f-ma20" type="number" step="0.01" placeholder="自動估算"></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm btn-primary" onclick="addStock()">新增持倉</button>
        <button class="btn btn-sm" onclick="toggleAddForm()">取消</button>
      </div>
    </div>
    <div class="log" id="update-log"></div>
  </div>

  <div class="footer">
    股價資料來源：Yahoo Finance（延遲約 15 分鐘）｜每 5 分鐘自動更新｜台股交易時間 09:00–13:30<br>
    本工具僅供個人參考，不構成投資建議。
  </div>
</div>

<script src="portfolio.js"></script>
</body>
</html>
